name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  firmware:
    runs-on: ubuntu-24.04
    env:
      PICO_SDK_CI_PATH: ${{ github.workspace }}/.cache/pico-sdk-ci
      PICOTOOL_FETCH_DIR: ${{ github.workspace }}/.cache/picotool-ci
    steps:
      - uses: actions/checkout@v4

      - name: Install firmware build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi ninja-build

      - name: Fetch pico-sdk 2.2.0
        run: |
          git clone --branch 2.2.0 --depth 1 --recurse-submodules --shallow-submodules https://github.com/raspberrypi/pico-sdk.git "${PICO_SDK_CI_PATH}"

      - name: Validate repository metadata
        run: |
          python3 -m json.tool scripts/board-presets.json > /dev/null
          python3 -c "import os, py_compile, tempfile; py_compile.compile('scripts/gui_server.py', doraise=True, cfile=os.path.join(tempfile.gettempdir(), 'meowkey_gui_server.pyc'))"
          python3 -c "import os, py_compile, tempfile; py_compile.compile('scripts/release-artifacts.py', doraise=True, cfile=os.path.join(tempfile.gettempdir(), 'meowkey_release_artifacts.pyc'))"
          python3 -c "import os, py_compile, tempfile; py_compile.compile('scripts/verify-manager-contract.py', doraise=True, cfile=os.path.join(tempfile.gettempdir(), 'meowkey_verify_manager_contract.pyc'))"
          bash -n scripts/flash.sh

      - name: Validate manager-channel contract
        run: python3 scripts/verify-manager-contract.py

      - name: Build firmware (debug)
        run: |
          cmake -S . -B build-ci -G Ninja \
            -DPICO_BOARD=meowkey_rp2350_usb \
            -DPICO_SDK_PATH="${PICO_SDK_CI_PATH}" \
            -DPICO_NO_PICOTOOL=ON \
            -DMEOWKEY_ENABLE_SIMULATED_SECURE_ELEMENT=ON \
            -DMEOWKEY_VERSION_LABEL=ci
          cmake --build build-ci --parallel
          grep -q "#define MEOWKEY_ENABLE_SIMULATED_SECURE_ELEMENT 1" build-ci/generated/meowkey_build_config.h

      - name: Build firmware (hardened)
        run: |
          cmake -S . -B build-ci-hardened -G Ninja \
            -DPICO_BOARD=meowkey_rp2350_usb \
            -DPICO_SDK_PATH="${PICO_SDK_CI_PATH}" \
            -DPICO_NO_PICOTOOL=ON \
            -DMEOWKEY_ENABLE_DEBUG_HID=OFF \
            -DMEOWKEY_ENABLE_SIMULATED_SECURE_ELEMENT=ON \
            -DMEOWKEY_VERSION_LABEL=ci
          cmake --build build-ci-hardened --parallel
          grep -q "#define MEOWKEY_ENABLE_DEBUG_HID 0" build-ci-hardened/generated/meowkey_build_config.h
          grep -q "#define MEOWKEY_ENABLE_SIMULATED_SECURE_ELEMENT 1" build-ci-hardened/generated/meowkey_build_config.h
          grep -q "#define MEOWKEY_MANAGER_REQUIRE_AUTH_FOR_SUMMARIES 1" build-ci-hardened/generated/meowkey_build_config.h

      - name: Build probe firmware
        run: cmake --build build-ci --parallel --target meowkey_probe

      - name: Build firmware (secure-boot-ready hardened)
        run: |
          openssl ecparam -name secp256k1 -genkey -noout -out "${RUNNER_TEMP}/meowkey-secureboot.pem"
          cmake -S . -B build-ci-secure-ready -G Ninja \
            -DPICO_BOARD=meowkey_rp2350_usb \
            -DPICO_SDK_PATH="${PICO_SDK_CI_PATH}" \
            -DPICOTOOL_FETCH_FROM_GIT_PATH="${PICOTOOL_FETCH_DIR}" \
            -DMEOWKEY_ENABLE_DEBUG_HID=OFF \
            -DMEOWKEY_ENABLE_SIMULATED_SECURE_ELEMENT=ON \
            -DMEOWKEY_ENABLE_SIGNED_BOOT=ON \
            -DMEOWKEY_ENABLE_ANTI_ROLLBACK=ON \
            -DMEOWKEY_SIGNING_KEY="${RUNNER_TEMP}/meowkey-secureboot.pem" \
            -DMEOWKEY_VERSION_LABEL=ci
          cmake --build build-ci-secure-ready --parallel
          test -f build-ci-secure-ready/meowkey.otp.json
          grep -q "#define MEOWKEY_ENABLE_SIMULATED_SECURE_ELEMENT 1" build-ci-secure-ready/generated/meowkey_build_config.h
          grep -q "#define MEOWKEY_MANAGER_REQUIRE_AUTH_FOR_SUMMARIES 1" build-ci-secure-ready/generated/meowkey_build_config.h

  desktop:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - uses: dtolnay/rust-toolchain@stable

      - name: Check Rust manager
        run: cargo check --locked --manifest-path native-rs/meowkey-manager/Cargo.toml

      - name: Smoke-test probe script
        shell: powershell
        run: |
          $temp = Join-Path $env:TEMP "meowkey-probe-sample.json"
          @'
          {
            "schemaVersion": 1,
            "tool": "meowkey-probe",
            "uniqueId": "00112233445566778899aabbccddeeff",
            "flashSizeBytes": 16777216,
            "gpio": {
              "pinCount": 30,
              "forcedPinCandidates": [2, 3],
              "pins": [
                {"pin": 2, "raw": false, "pullUp": false, "pullDown": false, "classification": "forced-low"},
                {"pin": 3, "raw": true, "pullUp": true, "pullDown": true, "classification": "forced-high"}
              ]
            },
            "i2c": {
              "pairs": [
                {"instance": 0, "sdaPin": 4, "sclPin": 5, "devices": ["0x50"]}
              ],
              "eepromCandidates": [
                {"instance": 0, "sdaPin": 4, "sclPin": 5, "address": "0x50", "readWith8BitOffset": true, "readWith16BitOffset": false, "addressWidth": 1, "suggestedPreset": "24c02", "rawHex": "0011223344556677"}
              ]
            }
          }
          '@ | Set-Content -Path $temp -Encoding utf8
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\probe-board.ps1 -InputPath $temp | Out-Null

      - name: Build WinUI manager
        run: dotnet build windows/gui/MeowKey.Manager/MeowKey.Manager.csproj -c Release -p:ContinuousIntegrationBuild=true

      - name: Build manager attack harness
        run: dotnet build tests/manager-attack-harness/ManagerAttackHarness.csproj -c Release

  manager-winui-signed-package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Sign driver and package WinUI manager
        shell: powershell
        env:
          MEOWKEY_MANAGER_DRIVER_SIGNING_PFX_B64: ${{ secrets.MEOWKEY_MANAGER_DRIVER_SIGNING_PFX_B64 }}
          MEOWKEY_MANAGER_DRIVER_SIGNING_PFX_PASSWORD: ${{ secrets.MEOWKEY_MANAGER_DRIVER_SIGNING_PFX_PASSWORD }}
        run: |
          $ErrorActionPreference = "Stop"

          $tag = "ci-$env:GITHUB_RUN_NUMBER"
          $version = "0.0.0-ci"
          $distDir = Join-Path $PWD "dist-ci-signed-winui"
          $publishDir = Join-Path $env:RUNNER_TEMP "meowkey-manager-winui-publish"
          $packageDir = Join-Path $env:RUNNER_TEMP "meowkey-$tag-manager-winui"
          $zipPath = Join-Path $distDir "meowkey-$tag-manager-winui.zip"
          $driverDir = Join-Path $PWD "windows\driver\manager-winusb"
          $driverPfxPath = Join-Path $env:RUNNER_TEMP "meowkey-manager-driver-signing-ci.pfx"
          $driverCatPath = Join-Path $driverDir "meowkey-manager-winusb.cat"

          $pfxBase64 = ($env:MEOWKEY_MANAGER_DRIVER_SIGNING_PFX_B64 -replace '\s', '')
          $pfxPassword = $env:MEOWKEY_MANAGER_DRIVER_SIGNING_PFX_PASSWORD

          if ([string]::IsNullOrWhiteSpace($pfxBase64)) {
            Write-Host "[ci] signing secrets not configured; generating temporary self-signed PFX for pipeline verification."
            $pfxPassword = "MeowKeyCI"
            $cert = New-SelfSignedCertificate `
              -Type CodeSigningCert `
              -Subject "CN=MeowKey CI Driver Test" `
              -KeyAlgorithm RSA `
              -KeyLength 2048 `
              -HashAlgorithm SHA256 `
              -CertStoreLocation "Cert:\CurrentUser\My"
            $securePassword = ConvertTo-SecureString $pfxPassword -AsPlainText -Force
            Export-PfxCertificate -Cert $cert -FilePath $driverPfxPath -Password $securePassword | Out-Null
          } else {
            if ([string]::IsNullOrWhiteSpace($pfxPassword)) {
              throw "MEOWKEY_MANAGER_DRIVER_SIGNING_PFX_PASSWORD is empty while PFX_B64 is configured."
            }
            try {
              $pfxBytes = [System.Convert]::FromBase64String($pfxBase64)
            } catch {
              throw "MEOWKEY_MANAGER_DRIVER_SIGNING_PFX_B64 is not valid base64."
            }
            [System.IO.File]::WriteAllBytes($driverPfxPath, $pfxBytes)
            Write-Host "[ci] decoded PFX bytes: $($pfxBytes.Length)"
          }

          powershell -ExecutionPolicy Bypass -File .\windows\driver\manager-winusb\sign-manager-driver.ps1 `
            -PfxPath $driverPfxPath `
            -PfxPassword $pfxPassword

          if (-not (Test-Path $driverCatPath)) {
            throw "Driver catalog missing after signing: $driverCatPath"
          }
          $driverSignature = Get-AuthenticodeSignature $driverCatPath
          Write-Host "[ci] driver catalog signature status: $($driverSignature.Status)"
          if ($driverSignature.Status -eq "NotSigned") {
            throw "Driver catalog is still unsigned after signing."
          }

          dotnet publish windows/gui/MeowKey.Manager/MeowKey.Manager.csproj `
            -c Release `
            -p:ContinuousIntegrationBuild=true `
            -p:Version=$version `
            -o $publishDir

          if (Test-Path $packageDir) {
            Remove-Item -Recurse -Force $packageDir
          }
          New-Item -ItemType Directory -Path $packageDir | Out-Null
          Copy-Item -Path "$publishDir\*" -Destination $packageDir -Recurse -Force
          Copy-Item -Path "windows/gui/MeowKey.Manager/README.md" -Destination $packageDir -Force
          $packageDriverDir = Join-Path $packageDir "windows\driver\manager-winusb"
          New-Item -ItemType Directory -Path $packageDriverDir -Force | Out-Null
          Copy-Item -Path "$driverDir\*" -Destination $packageDriverDir -Recurse -Force

          if (Test-Path $zipPath) {
            Remove-Item -Force $zipPath
          }
          New-Item -ItemType Directory -Path $distDir -Force | Out-Null
          Compress-Archive -Path $packageDir -DestinationPath $zipPath -CompressionLevel Optimal
          Write-Host "[ci] packaged zip: $zipPath"

      - uses: actions/upload-artifact@v4
        with:
          name: manager-winui-signed-ci-zip
          path: dist-ci-signed-winui/*.zip
