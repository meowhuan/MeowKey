name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    environment:
      name: release
    env:
      PICOTOOL_FETCH_DIR: ${{ github.workspace }}/.cache/picotool-release
      PICO_SDK_CI_PATH: ${{ github.workspace }}/.cache/pico-sdk-release
      MEOWKEY_SECUREBOOT_KEY_PATH: ${{ github.workspace }}/.cache/meowkey-secureboot.pem
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        run: |
          echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"

      - name: Parse version
        run: |
          TAG="${RELEASE_TAG#v}"
          if [[ ! "$TAG" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(-([0-9A-Za-z.-]+))?$ ]]; then
            echo "Unsupported release tag: ${RELEASE_TAG}" >&2
            exit 1
          fi
          MAJOR="${BASH_REMATCH[1]}"
          MINOR="${BASH_REMATCH[2]}"
          PATCH="${BASH_REMATCH[3]}"
          LABEL="${BASH_REMATCH[5]}"
          echo "MEOWKEY_VERSION_MAJOR=$MAJOR" >> "$GITHUB_ENV"
          echo "MEOWKEY_VERSION_MINOR=$MINOR" >> "$GITHUB_ENV"
          echo "MEOWKEY_VERSION_PATCH=$PATCH" >> "$GITHUB_ENV"
          echo "MEOWKEY_VERSION_LABEL=$LABEL" >> "$GITHUB_ENV"
          if [[ -n "$LABEL" ]]; then
            echo "MEOWKEY_RELEASE_IS_PRERELEASE=true" >> "$GITHUB_ENV"
          else
            echo "MEOWKEY_RELEASE_IS_PRERELEASE=false" >> "$GITHUB_ENV"
          fi

      - name: Install firmware build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi ninja-build

      - name: Fetch pico-sdk 2.2.0
        run: |
          git clone --branch 2.2.0 --depth 1 --recurse-submodules --shallow-submodules https://github.com/raspberrypi/pico-sdk.git "${PICO_SDK_CI_PATH}"

      - name: Materialize optional secure boot signing key
        env:
          MEOWKEY_SECUREBOOT_PEM_B64: ${{ secrets.MEOWKEY_SECUREBOOT_PEM_B64 }}
        run: |
          if [[ -n "${MEOWKEY_SECUREBOOT_PEM_B64}" ]]; then
            mkdir -p "$(dirname "${MEOWKEY_SECUREBOOT_KEY_PATH}")"
            printf '%s' "${MEOWKEY_SECUREBOOT_PEM_B64}" | base64 -d > "${MEOWKEY_SECUREBOOT_KEY_PATH}"
            echo "MEOWKEY_SECUREBOOT_ENABLED=true" >> "$GITHUB_ENV"
          else
            echo "MEOWKEY_SECUREBOOT_ENABLED=false" >> "$GITHUB_ENV"
          fi

      - name: Build and package release artifacts
        run: |
          SECURE_BOOT_ARGS=()
          if [[ "${MEOWKEY_SECUREBOOT_ENABLED}" == "true" ]]; then
            SECURE_BOOT_ARGS+=(--secure-boot-signing-key "${MEOWKEY_SECUREBOOT_KEY_PATH}")
          fi
          python3 scripts/release-artifacts.py \
            --tag "${RELEASE_TAG}" \
            --version-major "${MEOWKEY_VERSION_MAJOR}" \
            --version-minor "${MEOWKEY_VERSION_MINOR}" \
            --version-patch "${MEOWKEY_VERSION_PATCH}" \
            --version-label "${MEOWKEY_VERSION_LABEL}" \
            --pico-sdk-path "${PICO_SDK_CI_PATH}" \
            --picotool-fetch-path "${PICOTOOL_FETCH_DIR}" \
            --dist-dir dist \
            "${SECURE_BOOT_ARGS[@]}"

      - uses: actions/upload-artifact@v4
        with:
          name: meowkey-${{ env.RELEASE_TAG }}
          path: |
            dist/*.zip
            dist/SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          prerelease: ${{ env.MEOWKEY_RELEASE_IS_PRERELEASE == 'true' }}
          files: |
            dist/*.zip
            dist/SHA256SUMS.txt
