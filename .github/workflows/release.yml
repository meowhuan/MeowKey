name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  firmware:
    runs-on: ubuntu-24.04
    environment:
      name: release
    env:
      PICOTOOL_FETCH_DIR: ${{ github.workspace }}/.cache/picotool-release
      PICO_SDK_CI_PATH: ${{ github.workspace }}/.cache/pico-sdk-release
      MEOWKEY_SECUREBOOT_KEY_PATH: ${{ github.workspace }}/.cache/meowkey-secureboot.pem
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        run: |
          echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"

      - name: Parse version
        run: |
          TAG="${RELEASE_TAG#v}"
          if [[ ! "$TAG" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(-([0-9A-Za-z.-]+))?$ ]]; then
            echo "Unsupported release tag: ${RELEASE_TAG}" >&2
            exit 1
          fi
          MAJOR="${BASH_REMATCH[1]}"
          MINOR="${BASH_REMATCH[2]}"
          PATCH="${BASH_REMATCH[3]}"
          LABEL="${BASH_REMATCH[5]}"
          echo "MEOWKEY_VERSION_MAJOR=$MAJOR" >> "$GITHUB_ENV"
          echo "MEOWKEY_VERSION_MINOR=$MINOR" >> "$GITHUB_ENV"
          echo "MEOWKEY_VERSION_PATCH=$PATCH" >> "$GITHUB_ENV"
          echo "MEOWKEY_VERSION_LABEL=$LABEL" >> "$GITHUB_ENV"
          if [[ -n "$LABEL" ]]; then
            echo "MEOWKEY_RELEASE_IS_PRERELEASE=true" >> "$GITHUB_ENV"
          else
            echo "MEOWKEY_RELEASE_IS_PRERELEASE=false" >> "$GITHUB_ENV"
          fi

      - name: Install firmware build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi ninja-build

      - name: Fetch pico-sdk 2.2.0
        run: |
          git clone --branch 2.2.0 --depth 1 --recurse-submodules --shallow-submodules https://github.com/raspberrypi/pico-sdk.git "${PICO_SDK_CI_PATH}"

      - name: Validate manager-channel contract
        run: python3 scripts/verify-manager-contract.py

      - name: Materialize optional secure boot signing key
        env:
          MEOWKEY_SECUREBOOT_PEM_B64: ${{ secrets.MEOWKEY_SECUREBOOT_PEM_B64 }}
        run: |
          if [[ -n "${MEOWKEY_SECUREBOOT_PEM_B64}" ]]; then
            mkdir -p "$(dirname "${MEOWKEY_SECUREBOOT_KEY_PATH}")"
            printf '%s' "${MEOWKEY_SECUREBOOT_PEM_B64}" | base64 -d > "${MEOWKEY_SECUREBOOT_KEY_PATH}"
            if openssl ec -in "${MEOWKEY_SECUREBOOT_KEY_PATH}" -noout >/dev/null 2>&1; then
              echo "MEOWKEY_SECUREBOOT_KEY_ALGORITHM=EC" >> "$GITHUB_ENV"
            elif openssl rsa -in "${MEOWKEY_SECUREBOOT_KEY_PATH}" -noout >/dev/null 2>&1; then
              echo "MEOWKEY_SECUREBOOT_KEY_ALGORITHM=RSA" >> "$GITHUB_ENV"
            else
              echo "Unsupported secure boot key format or algorithm in MEOWKEY_SECUREBOOT_PEM_B64." >&2
              echo "Use an RSA or EC private key in PEM form before base64 encoding it." >&2
              exit 1
            fi
            echo "MEOWKEY_SECUREBOOT_ENABLED=true" >> "$GITHUB_ENV"
          else
            echo "MEOWKEY_SECUREBOOT_ENABLED=false" >> "$GITHUB_ENV"
          fi

      - name: Build and package release artifacts
        run: |
          SECURE_BOOT_ARGS=()
          if [[ "${MEOWKEY_SECUREBOOT_ENABLED}" == "true" ]]; then
            SECURE_BOOT_ARGS+=(--secure-boot-signing-key "${MEOWKEY_SECUREBOOT_KEY_PATH}")
          fi
          python3 scripts/release-artifacts.py \
            --tag "${RELEASE_TAG}" \
            --version-major "${MEOWKEY_VERSION_MAJOR}" \
            --version-minor "${MEOWKEY_VERSION_MINOR}" \
            --version-patch "${MEOWKEY_VERSION_PATCH}" \
            --version-label "${MEOWKEY_VERSION_LABEL}" \
            --pico-sdk-path "${PICO_SDK_CI_PATH}" \
            --picotool-fetch-path "${PICOTOOL_FETCH_DIR}" \
            --dist-dir dist \
            "${SECURE_BOOT_ARGS[@]}"

      - uses: actions/upload-artifact@v4
        with:
          name: firmware-release-zips
          path: dist/*.zip

  manager-winui-driver-sign:
    runs-on: windows-latest
    environment:
      name: release
    steps:
      - uses: actions/checkout@v4

      - name: Sign WinUI driver package
        shell: powershell
        env:
          MEOWKEY_MANAGER_DRIVER_SIGNING_PFX_B64: ${{ secrets.MEOWKEY_MANAGER_DRIVER_SIGNING_PFX_B64 }}
          MEOWKEY_MANAGER_DRIVER_SIGNING_PFX_PASSWORD: ${{ secrets.MEOWKEY_MANAGER_DRIVER_SIGNING_PFX_PASSWORD }}
        run: |
          $driverDir = Join-Path $PWD "windows\driver\manager-winusb"
          $driverInfPath = Join-Path $driverDir "meowkey-manager-winusb.inf"
          $driverCatPath = Join-Path $driverDir "meowkey-manager-winusb.cat"
          $driverCerPath = Join-Path $driverDir "meowkey-manager-winusb.cer"
          $driverPfxPath = Join-Path $env:RUNNER_TEMP "meowkey-manager-driver-signing.pfx"

          if (-not (Test-Path $driverInfPath)) {
            throw "Driver INF missing: $driverInfPath"
          }

          $pfxBase64 = ($env:MEOWKEY_MANAGER_DRIVER_SIGNING_PFX_B64 -replace '\s', '')
          if ([string]::IsNullOrWhiteSpace($pfxBase64)) {
            throw "MEOWKEY_MANAGER_DRIVER_SIGNING_PFX_B64 is empty."
          }
          if ([string]::IsNullOrWhiteSpace($env:MEOWKEY_MANAGER_DRIVER_SIGNING_PFX_PASSWORD)) {
            throw "MEOWKEY_MANAGER_DRIVER_SIGNING_PFX_PASSWORD is empty."
          }

          try {
            $pfxBytes = [System.Convert]::FromBase64String($pfxBase64)
          } catch {
            throw "MEOWKEY_MANAGER_DRIVER_SIGNING_PFX_B64 is not valid base64."
          }
          [System.IO.File]::WriteAllBytes($driverPfxPath, $pfxBytes)
          Write-Host "[driver] decoded PFX bytes: $($pfxBytes.Length)"

          $signArgs = @(
            "-ExecutionPolicy", "Bypass",
            "-File", ".\windows\driver\manager-winusb\sign-manager-driver.ps1",
            "-PfxPath", $driverPfxPath,
            "-PfxPassword", $env:MEOWKEY_MANAGER_DRIVER_SIGNING_PFX_PASSWORD,
            "-TimestampUrl", "http://timestamp.digicert.com",
            "-ExportSignerCertificatePath", $driverCerPath,
            "-UseMakeCatFallback",
            "-AllowUntrustedRootVerification"
          )
          powershell @signArgs
          if ($LASTEXITCODE -ne 0) {
            throw "sign-manager-driver.ps1 failed with exit code $LASTEXITCODE."
          }

          if (-not (Test-Path $driverCatPath)) {
            throw "Driver catalog missing after signing: $driverCatPath"
          }
          $driverSignature = Get-AuthenticodeSignature $driverCatPath
          Write-Host "[driver] catalog signature status: $($driverSignature.Status)"
          if ($driverSignature.Status -eq "NotSigned") {
            throw "Driver catalog is still unsigned after sign-manager-driver.ps1."
          }

      - uses: actions/upload-artifact@v4
        with:
          name: manager-winui-driver-signed
          path: windows/driver/manager-winusb/*

  manager-winui:
    runs-on: windows-latest
    needs:
      - manager-winui-driver-sign
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - uses: actions/download-artifact@v4
        with:
          name: manager-winui-driver-signed
          path: ${{ runner.temp }}/manager-winui-driver-signed

      - name: Publish WinUI manager
        shell: powershell
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          $version = if ($tag.StartsWith("v")) { $tag.Substring(1) } else { $tag }
          $distDir = Join-Path $PWD "dist"
          $publishDir = Join-Path $env:RUNNER_TEMP "meowkey-manager-winui-publish"
          $packageDir = Join-Path $env:RUNNER_TEMP "meowkey-$tag-manager-winui"
          $zipPath = Join-Path $distDir "meowkey-$tag-manager-winui.zip"
          $driverSourceDir = Join-Path $env:RUNNER_TEMP "manager-winui-driver-signed"

          dotnet publish windows/gui/MeowKey.Manager/MeowKey.Manager.csproj `
            -c Release `
            -p:ContinuousIntegrationBuild=true `
            -p:Version=$version `
            -o $publishDir

          if (Test-Path $packageDir) {
            Remove-Item -Recurse -Force $packageDir
          }
          New-Item -ItemType Directory -Path $packageDir | Out-Null
          Copy-Item -Path "$publishDir\*" -Destination $packageDir -Recurse -Force
          Copy-Item -Path "windows/gui/MeowKey.Manager/README.md" -Destination $packageDir -Force
          $driverDir = Join-Path $packageDir "windows\driver\manager-winusb"
          New-Item -ItemType Directory -Path $driverDir -Force | Out-Null
          Copy-Item -Path "$driverSourceDir\*" -Destination $driverDir -Recurse -Force

          if (Test-Path $zipPath) {
            Remove-Item -Force $zipPath
          }
          New-Item -ItemType Directory -Path $distDir -Force | Out-Null
          Compress-Archive -Path $packageDir -DestinationPath $zipPath -CompressionLevel Optimal

      - uses: actions/upload-artifact@v4
        with:
          name: manager-winui-zip
          path: dist/*.zip

  manager-rust-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Rust manager build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libudev-dev \
            libusb-1.0-0-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libx11-dev \
            libxi-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            zip

      - name: Build Rust Linux manager
        run: |
          RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          MEOWKEY_RELEASE_VERSION="${RELEASE_VERSION}" \
            cargo build --release --locked --manifest-path native-rs/meowkey-manager/Cargo.toml

      - name: Package Rust Linux manager
        run: |
          TAG="${GITHUB_REF_NAME}"
          PACKAGE_BASENAME="meowkey-${TAG}-manager-rust-linux"
          PACKAGE_DIR="${RUNNER_TEMP}/${PACKAGE_BASENAME}"
          DIST_DIR="${GITHUB_WORKSPACE}/dist"
          ZIP_PATH="${DIST_DIR}/${PACKAGE_BASENAME}.zip"
          rm -rf "${PACKAGE_DIR}"
          mkdir -p "${PACKAGE_DIR}"
          mkdir -p "${DIST_DIR}"
          cp native-rs/meowkey-manager/target/release/meowkey-manager "${PACKAGE_DIR}/"
          cp native-rs/meowkey-manager/README.md "${PACKAGE_DIR}/"
          chmod +x "${PACKAGE_DIR}/meowkey-manager"
          (
            cd "${RUNNER_TEMP}"
            zip -r "${PACKAGE_BASENAME}.zip" "${PACKAGE_BASENAME}"
          )
          mv "${RUNNER_TEMP}/${PACKAGE_BASENAME}.zip" "${ZIP_PATH}"

      - uses: actions/upload-artifact@v4
        with:
          name: manager-rust-linux-zip
          path: dist/*.zip

  publish:
    runs-on: ubuntu-24.04
    needs:
      - firmware
      - manager-winui
      - manager-rust-linux
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: firmware-release-zips
          path: release-dist

      - uses: actions/download-artifact@v4
        with:
          name: manager-winui-zip
          path: release-dist

      - uses: actions/download-artifact@v4
        with:
          name: manager-rust-linux-zip
          path: release-dist

      - name: Build release checksum manifest
        run: |
          cd release-dist
          find . -maxdepth 1 -type f -name '*.zip' -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            | sed 's#  \./#  #' > SHA256SUMS.txt

      - name: Resolve prerelease flag
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            echo "MEOWKEY_RELEASE_IS_PRERELEASE=true" >> "$GITHUB_ENV"
          else
            echo "MEOWKEY_RELEASE_IS_PRERELEASE=false" >> "$GITHUB_ENV"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ env.MEOWKEY_RELEASE_IS_PRERELEASE == 'true' }}
          files: |
            release-dist/*.zip
            release-dist/SHA256SUMS.txt
