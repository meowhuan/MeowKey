name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    env:
      PICOTOOL_FETCH_DIR: ${{ github.workspace }}/.cache/picotool-release
      PICO_SDK_CI_PATH: ${{ github.workspace }}/.cache/pico-sdk-release
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        run: |
          echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"

      - name: Parse version
        run: |
          TAG="${RELEASE_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$TAG"
          test -n "$MAJOR"
          test -n "$MINOR"
          test -n "$PATCH"
          echo "MEOWKEY_VERSION_MAJOR=$MAJOR" >> "$GITHUB_ENV"
          echo "MEOWKEY_VERSION_MINOR=$MINOR" >> "$GITHUB_ENV"
          echo "MEOWKEY_VERSION_PATCH=$PATCH" >> "$GITHUB_ENV"

      - name: Install firmware build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi ninja-build

      - name: Fetch pico-sdk 2.2.0
        run: |
          git clone --branch 2.2.0 --depth 1 --recurse-submodules --shallow-submodules https://github.com/raspberrypi/pico-sdk.git "${PICO_SDK_CI_PATH}"

      - name: Build and package release artifacts
        run: |
          python3 scripts/release-artifacts.py \
            --tag "${RELEASE_TAG}" \
            --version-major "${MEOWKEY_VERSION_MAJOR}" \
            --version-minor "${MEOWKEY_VERSION_MINOR}" \
            --version-patch "${MEOWKEY_VERSION_PATCH}" \
            --pico-sdk-path "${PICO_SDK_CI_PATH}" \
            --picotool-fetch-path "${PICOTOOL_FETCH_DIR}" \
            --dist-dir dist

      - uses: actions/upload-artifact@v4
        with:
          name: meowkey-${{ env.RELEASE_TAG }}
          path: |
            dist/*.zip
            dist/SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/SHA256SUMS.txt
